# nginx config cho HoSoAI production.
# Đổi `api.hosoai.com` thành domain thật của bạn trước khi deploy.

# HTTP → HTTPS redirect + ACME challenge cho Let's Encrypt
server {
    listen 80;
    server_name api.hosoai.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy → uvicorn
server {
    listen 443 ssl http2;
    server_name api.hosoai.com;

    ssl_certificate     /etc/letsencrypt/live/api.hosoai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hosoai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # File upload max size (biểu mẫu tải lên nếu có)
    client_max_body_size 25M;

    # Timeout dài hơn cho /chat/ask (LLM 1-5s) và /admin/sources/agencies (~15s)
    proxy_connect_timeout 90s;
    proxy_send_timeout 90s;
    proxy_read_timeout 90s;

    location / {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
